<div class="px-4 py-6 sm:px-6 space-y-6">
    <div>
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Название проекта
            <span class="text-red-500">*</span>
        </label>
        <input type="text"
               name="name"
               id="name"
               value="{% if project %}{{ project.name }}{% endif %}"
               placeholder="Например, AR Furniture Catalog"
               class="form-input w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2"
               required
               minlength="3"
               maxlength="100">
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
            Укажите понятное и описательное название проекта
        </p>
    </div>

    <div>
        <label for="company_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Компания
            <span class="text-red-500">*</span>
        </label>
        <select name="company_id"
                id="company_id"
                class="form-select w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2"
                required>
            <option value="">-- Выберите компанию --</option>
            {% for company in companies %}
            <option value="{{ company.id }}"
                    {% if project and project.company_id == company.id %}selected{% endif %}>
                {{ company.name }}
            </option>
            {% endfor %}
        </select>
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
            Выберите организацию, к которой относится проект
        </p>
    </div>

    <div>
        <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Статус
        </label>
        <div class="flex gap-4">
            <label class="flex items-center">
                <input type="radio"
                       name="status"
                       value="active"
                       {% if not project or project.status == 'active' %}checked{% endif %}
                       class="w-4 h-4 text-indigo-600 dark:text-indigo-400">
                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Активен</span>
            </label>
            <label class="flex items-center">
                <input type="radio"
                       name="status"
                       value="inactive"
                       {% if project and project.status == 'inactive' %}checked{% endif %}
                       class="w-4 h-4 text-indigo-600 dark:text-indigo-400">
                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Неактивен</span>
            </label>
            <label class="flex items-center">
                <input type="radio"
                       name="status"
                       value="archived"
                       {% if project and project.status == 'archived' %}checked{% endif %}
                       class="w-4 h-4 text-indigo-600 dark:text-indigo-400">
                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Архивный</span>
            </label>
        </div>
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
            Определяет, используется ли проект в работе
        </p>
    </div>

    <div>
        <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Описание
        </label>
        <textarea name="description"
                  id="description"
                  rows="4"
                  placeholder="Добавьте заметки о проекте, его назначении или особых требованиях..."
                  class="form-input w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 resize-vertical"
                  maxlength="500"></textarea>
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
            Необязательно: укажите дополнительные сведения о проекте
        </p>
    </div>
</div>
