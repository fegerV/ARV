<div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white">Фильтры</h3>
        <button @click="resetFilters" class="text-sm text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 font-medium">
            Сбросить
        </button>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <div>
            <label for="status-filter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                Статус
            </label>
            <select
                id="status-filter"
                x-model="filters.status"
                @change="applyFilters"
                class="form-select w-full">
                <option value="">Все статусы</option>
                <option value="active">Активен</option>
                <option value="inactive">Неактивен</option>
                <option value="archived">Архивный</option>
            </select>
        </div>

        <div>
            <label for="company-filter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                Компания
            </label>
            <select
                id="company-filter"
                x-model="filters.company"
                @change="applyFilters"
                class="form-select w-full">
                <option value="">Все компании</option>
                {% for company in companies %}
                <option value="{{ company.id }}">{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="page-size-select" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                Записей на странице
            </label>
            <select
                id="page-size-select"
                x-model="pageSize"
                @change="changePageSize"
                class="form-select w-full">
                <option value="20" {% if page_size == 20 %}selected{% endif %}>20</option>
                <option value="30" {% if page_size == 30 %}selected{% endif %}>30</option>
                <option value="40" {% if page_size == 40 %}selected{% endif %}>40</option>
                <option value="50" {% if page_size == 50 %}selected{% endif %}>50</option>
            </select>
        </div>

        <div class="flex items-end">
            <div class="w-full p-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg">
                <p class="text-sm text-blue-800 dark:text-blue-200">
                    Показано <span x-text="projects.length" class="font-semibold">{{ projects|length }}</span>
                    из <span x-text="totalCount" class="font-semibold">{{ total_count }}</span> проектов
                </p>
            </div>
        </div>
    </div>
</div>
