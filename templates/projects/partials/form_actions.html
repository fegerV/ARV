<div class="px-4 py-4 sm:px-6 bg-gray-50 dark:bg-gray-900/50 flex items-center justify-between">
    <a href="/projects" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-sm font-medium inline-flex items-center gap-1 transition-colors">
        <span class="material-icons text-base">chevron_left</span>
        {{ "Back to projects" if request.state.locale == "en" else "К списку проектов" }}
    </a>
    <div class="flex gap-3">
        <a href="/projects" class="inline-flex items-center justify-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            {{ "Cancel" if request.state.locale == "en" else "Отмена" }}
        </a>
        <button type="submit"
                :disabled="isSubmitting"
                class="inline-flex items-center justify-center px-4 py-2 bg-indigo-600 dark:bg-indigo-700 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            <span x-show="!isSubmitting" class="flex items-center gap-2">
                <span class="material-icons text-base">check</span>
                {% if project %}{{ "Save changes" if request.state.locale == "en" else "Сохранить изменения" }}{% else %}{{ "Create project" if request.state.locale == "en" else "Создать проект" }}{% endif %}
            </span>
            <span x-show="isSubmitting" class="flex items-center gap-2">
                <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                {{ "Saving..." if request.state.locale == "en" else "Сохранение..." }}
            </span>
        </button>
    </div>
</div>
