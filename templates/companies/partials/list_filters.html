<div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white">{{ "Filters" if request.state.locale == "en" else "Фильтры" }}</h3>
        <button @click="resetFilters" class="text-sm text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 font-medium">
            {{ "Reset" if request.state.locale == "en" else "Сбросить" }}
        </button>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <div>
            <label for="status-filter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                {{ "Status" if request.state.locale == "en" else "Статус" }}
            </label>
            <select
                id="status-filter"
                x-model="filters.status"
                @change="applyFilters"
                class="form-select w-full">
                <option value="">{{ "All statuses" if request.state.locale == "en" else "Все статусы" }}</option>
                <option value="active">{{ "Active" if request.state.locale == "en" else "Активна" }}</option>
                <option value="inactive">{{ "Inactive" if request.state.locale == "en" else "Неактивна" }}</option>
            </select>
        </div>

        <div>
            <label for="search-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                {{ "Search" if request.state.locale == "en" else "Поиск" }}
            </label>
            <input
                id="search-input"
                type="text"
                placeholder="{{ 'Search by name or email...' if request.state.locale == 'en' else 'Поиск по названию или email...' }}"
                x-model="filters.search"
                @input.debounce.300ms="applyFilters"
                class="form-input w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2">
        </div>

        <div>
            <label for="page-size-select" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                {{ "Rows per page" if request.state.locale == "en" else "Записей на странице" }}
            </label>
            <select
                id="page-size-select"
                x-model="pageSize"
                @change="changePageSize"
                class="form-select w-full">
                <option value="20" {% if page_size == 20 %}selected{% endif %}>20</option>
                <option value="30" {% if page_size == 30 %}selected{% endif %}>30</option>
                <option value="40" {% if page_size == 40 %}selected{% endif %}>40</option>
                <option value="50" {% if page_size == 50 %}selected{% endif %}>50</option>
            </select>
        </div>

        <div class="flex items-end">
            <div class="w-full p-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg">
                <p class="text-sm text-blue-800 dark:text-blue-200">
                    {{ "Showing" if request.state.locale == "en" else "Показано" }}
                    <span x-text="companies.length" class="font-semibold">{{ companies|length }}</span>
                    {{ "of" if request.state.locale == "en" else "из" }}
                    <span x-text="totalCount" class="font-semibold">{{ total_count }}</span>
                    {{ "companies" if request.state.locale == "en" else "компаний" }}
                </p>
            </div>
        </div>
    </div>
</div>
