<div x-show="activeTab === 'general'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">{{ t("settings.general.heading") }}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ t("settings.general.description") }}</p>
        </div>

        <form method="post" action="/settings/general" class="p-6 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="site_title" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.general.site_title") }}</label>
                    <input type="text" name="site_title" id="site_title" value="{{ settings.general.site_title|default('Vertex AR B2B Platform') }}" class="form-input" required>
                </div>
                <div>
                    <label for="admin_email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.general.admin_email") }}</label>
                    <input type="email" name="admin_email" id="admin_email" value="{{ settings.general.admin_email|default('admin@vertexar.com') }}" class="form-input" required>
                </div>
            </div>

            <div>
                <label for="site_description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.general.site_description") }}</label>
                <textarea id="site_description" name="site_description" rows="2" class="form-input">{{ settings.general.site_description|default('Vertex AR Admin') }}</textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="timezone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.general.timezone") }}</label>
                    <select id="timezone" name="timezone" class="form-select">
                        <option value="UTC" {% if settings.general.timezone == 'UTC' %}selected{% endif %}>UTC</option>
                        <option value="Europe/Moscow" {% if settings.general.timezone == 'Europe/Moscow' %}selected{% endif %}>Москва (UTC+3)</option>
                        <option value="Europe/London" {% if settings.general.timezone == 'Europe/London' %}selected{% endif %}>Лондон (UTC+0)</option>
                        <option value="America/New_York" {% if settings.general.timezone == 'America/New_York' %}selected{% endif %}>Нью-Йорк (UTC-5)</option>
                    </select>
                </div>
                <div>
                    <label for="language" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("common.language") }}</label>
                    <select id="language" name="language" class="form-select">
                        <option value="ru" {% if settings.general.language == 'ru' %}selected{% endif %}>{{ t("common.russian") }}</option>
                        <option value="en" {% if settings.general.language == 'en' %}selected{% endif %}>{{ t("common.english") }}</option>
                    </select>
                </div>
            </div>

            <input type="hidden" name="default_subscription_years" value="30">

            <div class="flex items-center gap-3 p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl border border-amber-200 dark:border-amber-800">
                <input id="maintenance_mode" name="maintenance_mode" type="checkbox" {% if settings.general.maintenance_mode %}checked{% endif %} value="on" class="h-4 w-4 text-amber-600 focus:ring-amber-500 border-gray-300 rounded">
                <label for="maintenance_mode" class="text-sm">
                    <span class="font-medium text-gray-900 dark:text-white">{{ t("settings.general.maintenance_mode") }}</span>
                    <span class="text-gray-500 dark:text-gray-400 block text-xs mt-0.5">{{ t("settings.general.maintenance_hint") }}</span>
                </label>
            </div>

            <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button" onclick="window.location.reload()" class="btn btn-secondary w-full sm:w-auto">{{ t("common.cancel") }}</button>
                <button type="submit" class="btn btn-primary w-full sm:w-auto"><span class="material-icons text-sm mr-1">save</span>{{ t("common.save") }}</button>
            </div>
        </form>
    </div>
</div>
