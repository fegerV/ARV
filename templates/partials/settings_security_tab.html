<div x-show="activeTab === 'security'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">{{ t("settings.security.heading") }}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ t("settings.security.description") }}</p>
        </div>

        <form method="post" action="/settings/security" class="p-6 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="password_min_length" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.password_min_length") }}</label>
                    <input type="number" name="password_min_length" id="password_min_length" value="{{ settings.security.password_min_length|default(8) }}" min="6" max="50" class="form-input">
                </div>
                <div>
                    <label for="session_timeout" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.session_timeout") }}</label>
                    <input type="number" name="session_timeout" id="session_timeout" value="{{ settings.security.session_timeout|default(60) }}" min="5" max="1440" class="form-input">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="max_login_attempts" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.max_login_attempts") }}</label>
                    <input type="number" name="max_login_attempts" id="max_login_attempts" value="{{ settings.security.max_login_attempts|default(5) }}" min="3" max="20" class="form-input">
                </div>
                <div>
                    <label for="lockout_duration" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.lockout_duration") }}</label>
                    <input type="number" name="lockout_duration" id="lockout_duration" value="{{ settings.security.lockout_duration|default(300) }}" min="60" max="3600" class="form-input">
                </div>
            </div>

            <div>
                <label for="api_rate_limit" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.api_rate_limit") }}</label>
                <input type="number" name="api_rate_limit" id="api_rate_limit" value="{{ settings.security.api_rate_limit|default(100) }}" min="10" max="1000" class="form-input">
            </div>

            <div class="flex items-center gap-3 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-200 dark:border-blue-800">
                <input id="require_2fa" name="require_2fa" type="checkbox" {% if settings.security.require_2fa %}checked{% endif %} value="on" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="require_2fa" class="text-sm">
                    <span class="font-medium text-gray-900 dark:text-white">{{ t("settings.security.require_2fa") }}</span>
                    <span class="text-gray-500 dark:text-gray-400 block text-xs mt-0.5">{{ t("settings.security.require_2fa_hint") }}</span>
                </label>
            </div>

            <div>
                <label for="telegram_2fa_chat_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ t("settings.security.telegram_2fa_chat_id") }}</label>
                <input type="text" name="telegram_2fa_chat_id" id="telegram_2fa_chat_id" value="{{ settings.security.telegram_2fa_chat_id or '' }}" placeholder="-1001234567890" class="form-input max-w-xs">
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ t("settings.security.telegram_2fa_chat_id_hint") }}</p>
            </div>

            <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button" onclick="window.location.reload()" class="btn btn-secondary w-full sm:w-auto">{{ t("common.cancel") }}</button>
                <button type="submit" class="btn btn-primary w-full sm:w-auto"><span class="material-icons text-sm mr-1">save</span>{{ t("common.save") }}</button>
            </div>
        </form>
    </div>
</div>
