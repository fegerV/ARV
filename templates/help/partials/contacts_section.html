{% set is_en = request.state.locale == "en" %}

<section id="contacts" class="mb-10">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
        <span class="material-icons text-gray-500">contact_support</span>
        {{ "Contacts" if is_en else "Контакты" }}
    </h2>
    <p class="text-gray-700 dark:text-gray-300">
        {{ "For any Vertex AR platform questions:" if is_en else "По вопросам работы платформы Vertex AR:" }}
        <a href="mailto:support@neuroimagen.ru" class="text-indigo-600 dark:text-indigo-400 hover:underline">support@neuroimagen.ru</a>
    </p>
</section>
