<!DOCTYPE html>
<html lang="{{ request.state.locale|default('ru') }}" x-data x-init="$store.darkMode.init()" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}{{ request.state.site_title|default('Vertex AR Admin') }}{% endblock %}</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="/static/css/tailwind.css" rel="stylesheet">
    <script>
        (function () {
            const stored = localStorage.getItem('darkMode');
            const enabled = stored === null ? true : stored === 'true';
            if (enabled) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">

    <meta name="csrf-token" content="{{ request.state.csrf_token|default('') }}">
    <script>
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          if (document.body) {
            document.body.addEventListener('htmx:configRequest', (event) => {
              const csrfToken = document.querySelector('meta[name="csrf-token"]');
              if (csrfToken) {
                event.detail.headers['X-CSRF-Token'] = csrfToken.content;
              }
            });
          }
        });
      } else if (document.body) {
        document.body.addEventListener('htmx:configRequest', (event) => {
          const csrfToken = document.querySelector('meta[name="csrf-token"]');
          if (csrfToken) {
            event.detail.headers['X-CSRF-Token'] = csrfToken.content;
          }
        });
      }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    {% include "components/sidebar.html" %}

    <div class="lg:ml-64 transition-all duration-300">
        {% include "components/header.html" %}
        <main class="pt-16 pb-8 p-4">
            {% block content %}
                {% block body %}{% endblock %}
            {% endblock %}
        </main>
    </div>

    {% include "components/toast.html" %}
    {% include "components/modals.html" %}

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('darkMode', {
                darkMode: localStorage.getItem('darkMode') !== 'false',
                init() {
                    if (localStorage.getItem('darkMode') === null) {
                        localStorage.setItem('darkMode', 'true');
                    }
                    this.darkMode = localStorage.getItem('darkMode') === 'true';
                    document.documentElement.classList.toggle('dark', this.darkMode);
                },
                toggle() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('darkMode', this.darkMode);
                    document.documentElement.classList.toggle('dark', this.darkMode);
                }
            });

            Alpine.store('sidebar', {
                open: false,
                toggle() {
                    this.open = !this.open;
                },
                closeMobile() {
                    if (window.innerWidth < 1024) {
                        this.open = false;
                    }
                }
            });
        });

        function showToast(message, type = 'info') {
            const toastId = 'toast-' + Date.now();
            const toastClass = type === 'error' ? 'bg-red-500'
                : type === 'success' ? 'bg-green-500'
                : type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500';

            const toast = document.createElement('div');
            toast.id = toastId;
            toast.className = `toast ${toastClass} text-white p-4 rounded shadow-lg mb-2 transition-opacity duration-300`;
            toast.innerHTML = `
                <div class="flex items-center justify-between">
                    <span>${message}</span>
                    <button onclick="removeToast('${toastId}')" class="ml-4 text-white">×</button>
                </div>
            `;

            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-4 right-4 z-50 space-y-2';
                document.body.appendChild(container);
            }

            container.appendChild(toast);
            setTimeout(() => removeToast(toastId), 5000);
        }

        window.showToast = showToast;

        function getCsrfToken() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.content : '';
        }

        function csrfFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!headers.has('X-CSRF-Token')) {
                headers.set('X-CSRF-Token', getCsrfToken());
            }
            if (!headers.has('Content-Type') && !(options.body instanceof FormData)) {
                headers.set('Content-Type', 'application/json');
            }
            return fetch(url, {
                ...options,
                headers,
                credentials: options.credentials || 'include'
            });
        }

        window.getCsrfToken = getCsrfToken;
        window.csrfFetch = csrfFetch;

        function ensureCsrfFields() {
            const token = getCsrfToken();
            if (!token) return;
            document.querySelectorAll('form').forEach((form) => {
                const method = (form.getAttribute('method') || 'get').toUpperCase();
                if (!['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) return;
                if (form.querySelector('input[name="csrf_token"]')) return;
                const field = document.createElement('input');
                field.type = 'hidden';
                field.name = 'csrf_token';
                field.value = token;
                form.appendChild(field);
            });
        }

        window.ensureCsrfFields = ensureCsrfFields;
        document.addEventListener('DOMContentLoaded', ensureCsrfFields);
        document.body.addEventListener('htmx:afterSwap', ensureCsrfFields);

        function removeToast(toastId) {
            const toast = document.getElementById(toastId);
            if (toast) {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }
        }

        function showModal(content) {
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('modal-container').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal-container').style.display = 'none';
        }

        function submitForm(url, data, method = 'POST') {
            const element = document.createElement('div');
            element.setAttribute('hx-' + method.toLowerCase(), url);
            element.setAttribute('hx-headers', JSON.stringify(data));
            element.setAttribute('hx-target', 'body');
            element.setAttribute('hx-swap', 'innerHTML');
            htmx.process(element);
            element.click();
        }

        function confirmDelete(url) {
            if (confirm('{{ t("layout.confirm_delete") }}')) {
                window.location.href = url;
            }
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
