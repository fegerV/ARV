<header class="fixed top-0 right-0 left-0 lg:left-64 h-16 bg-white dark:bg-gray-800 shadow-md flex items-center px-4 z-30 transition-all duration-300">
    <div class="flex items-center space-x-4">
        <button @click="$store.sidebar.toggle()"
                class="lg:hidden material-icons text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white p-1">
            menu
        </button>
        <h2 class="text-lg font-semibold dark:text-white truncate">{% block page_title %}{% endblock %}</h2>
    </div>

    <div class="ml-auto flex items-center space-x-2 sm:space-x-3">
        <form method="post" action="/admin/language" class="m-0">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token|default('') }}">
            <label for="admin-language" class="sr-only">{{ t("common.language") }}</label>
            <select id="admin-language"
                    name="language"
                    onchange="this.form.submit()"
                    class="text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-2 py-1 text-gray-700 dark:text-gray-200">
                <option value="ru" {% if request.state.locale == 'ru' %}selected{% endif %}>{{ t("common.russian") }}</option>
                <option value="en" {% if request.state.locale == 'en' %}selected{% endif %}>{{ t("common.english") }}</option>
            </select>
        </form>

        <div x-data>
            <button @click="$store.darkMode.toggle()"
                    class="text-gray-600 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white p-1"
                    title="{{ t('layout.dark_mode') }}">
                <span class="material-icons" x-text="$store.darkMode.darkMode ? 'light_mode' : 'dark_mode'"></span>
            </button>
        </div>

        {% if current_user %}
        <span class="hidden sm:inline text-gray-600 dark:text-gray-300 text-sm truncate max-w-[150px]">{{ current_user.full_name or current_user.email }}</span>
        <form method="post" action="/admin/logout" class="m-0">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token|default('') }}">
            <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm whitespace-nowrap">{{ t("common.logout") }}</button>
        </form>
        {% else %}
        <span class="text-gray-600 dark:text-gray-300">{{ t("common.guest") }}</span>
        {% endif %}
    </div>
</header>
