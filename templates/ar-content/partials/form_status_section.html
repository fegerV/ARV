<div class="p-6 border-b border-gray-200 dark:border-gray-700" x-show="arContent && arContent.id">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">{{ t("ar_content.status") }}</h3>
    <div>
        <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            {{ t("ar_content.order_status") }}
        </label>
        <select name="status" id="status"
                class="form-select"
                x-cloak>
            <option value="pending" {% if ar_content and ar_content.status == 'pending' %}selected{% endif %}>{{ t("ar_content.pending") }}</option>
            <option value="processing" {% if ar_content and ar_content.status == 'processing' %}selected{% endif %}>{{ t("ar_content.processing") }}</option>
            <option value="ready" {% if ar_content and ar_content.status == 'ready' %}selected{% endif %}>{{ t("ar_content.ready") }}</option>
            <option value="failed" {% if ar_content and ar_content.status == 'failed' %}selected{% endif %}>{{ t("ar_content.failed") }}</option>
        </select>
    </div>
</div>
