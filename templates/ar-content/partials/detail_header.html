<div class="card p-0 overflow-hidden mb-6">
    <div class="px-4 py-5 sm:px-6 border-b border-gray-200 dark:border-gray-700 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-800 dark:to-gray-700">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                        Заказ {{ ar_content.order_number }}
                    </h1>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium"
                          :class="arContent.status === 'ready' ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-100' :
                                  arContent.status === 'processing' ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-100' :
                                  'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200'"
                          x-text="arContent.status || '—'"></span>
                </div>
                <p class="text-sm text-gray-600 dark:text-gray-400">
                    Карточка AR-контента и публикации
                </p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="/ar-content" class="btn btn-secondary">
                    <span class="material-icons mr-2">arrow_back</span>Назад
                </a>
                <a href="/ar-content/{{ ar_content.id }}/edit" class="btn btn-secondary">
                    <span class="material-icons mr-2">edit</span>Редактировать
                </a>
                <button @click="showQRDialog = true" class="btn btn-secondary">
                    <span class="material-icons mr-2">qr_code</span>QR-код
                </button>
                <button @click="showDeleteDialog = true" class="btn btn-danger">
                    <span class="material-icons mr-2">delete</span>Удалить
                </button>
            </div>
        </div>
    </div>

    <div class="px-4 py-4 bg-white dark:bg-gray-800">
        <div class="flex flex-wrap gap-3">
            <div class="flex items-center gap-2 text-sm">
                <span class="material-icons text-blue-600 dark:text-blue-400 text-base">business</span>
                <span class="text-gray-600 dark:text-gray-400">Компания:</span>
                <span class="font-medium text-gray-900 dark:text-white" x-text="arContent.company_name || '—'"></span>
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="material-icons text-green-600 dark:text-green-400 text-base">folder</span>
                <span class="text-gray-600 dark:text-gray-400">Проект:</span>
                <span class="font-medium text-gray-900 dark:text-white" x-text="arContent.project_name || '—'"></span>
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="material-icons text-gray-600 dark:text-gray-400 text-base">schedule</span>
                <span class="text-gray-600 dark:text-gray-400">Создан:</span>
                <span class="font-medium text-gray-900 dark:text-white">{{ ar_content.created_at | datetime_format if ar_content.created_at else '—' }}</span>
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="material-icons text-amber-600 dark:text-amber-400 text-base">tag</span>
                <span class="text-gray-600 dark:text-gray-400">ID:</span>
                <button @click="copyText(arContent.order_number, 'Номер заказа скопирован')" class="font-medium text-gray-900 dark:text-white hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" x-text="arContent.order_number || '—'"></button>
            </div>
            <div class="flex items-center gap-2 text-sm" x-show="arContent.unique_id">
                <span class="material-icons text-cyan-600 dark:text-cyan-400 text-base">fingerprint</span>
                <span class="text-gray-600 dark:text-gray-400">UUID:</span>
                <button @click="copyText(arContent.unique_id, 'UUID скопирован')" class="font-medium text-gray-900 dark:text-white hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors truncate max-w-[18rem] text-left" x-text="arContent.unique_id || '—'"></button>
            </div>
        </div>
    </div>
</div>
