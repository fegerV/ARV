<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Откройте AR для {{ order_number }}</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
        }
        h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
        }
        .ar-frame {
            position: relative;
            width: 100%;
            background: #000;
        }
        .ar-photo {
            width: 100%;
            display: block;
        }
        .buttons {
            margin-top: 20px;
        }
        .btn {
            display: block;
            margin: 10px auto;
            padding: 15px;
            width: 100%;
            max-width: 320px;
            background: #00a800;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn.secondary {
            background: #212121;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Откройте этот маркер</h2>
        <div class="ar-frame">
            <img src="{{ photo_url }}" alt="Маркер" class="ar-photo">
        </div>
        <div class="buttons">
            <a href="{{ app_url }}" class="btn">Открыть в AR-приложении</a>
            <a href="{{ photo_url }}" class="btn secondary" download="marker.jpg">Скачать маркер</a>
            <a href="{{ play_url }}" class="btn secondary">Скачать Android-приложение</a>
            {% if appstore_url %}
            <a href="{{ appstore_url }}" class="btn secondary">Скачать приложение для iPhone</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
