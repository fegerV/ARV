<div class="flex flex-wrap items-center gap-2 mb-6">
    <span class="text-sm text-gray-500 dark:text-gray-400 mr-1">{{ t("analytics.period") }}:</span>
    {% set period = analytics_data.period|default(30) %}
    {% for p, label in [(7, t('analytics.days_7')),(30, t('analytics.days_30')),(90, t('analytics.days_90')),(0, t('analytics.all_time'))] %}
    <a href="/analytics?period={{ p }}"
       class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors
              {% if period == p %}
              bg-indigo-600 text-white shadow-sm
              {% else %}
              bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600
              {% endif %}">
        {{ label }}
    </a>
    {% endfor %}
</div>
