[pytest]
pythonpath = .
addopts = 
    --cov=app --cov-report=html --cov-report=xml
    --cov-report=term-missing
    -v --strict-markers
    -p no:cacheprovider
    --asyncio-mode=auto

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: unit tests
    integration: integration tests with DB
    e2e: end-to-end tests
    slow: slow tests (>5s)
    docker: docker compose tests

filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning
    ignore:Exception ignored while finalizing file <gzip.*:pytest.PytestUnraisableExceptionWarning
