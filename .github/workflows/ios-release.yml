# iOS Release — сборка и загрузка в App Store Connect (TestFlight).
# Триггер: тег v*-ios или ручной запуск (workflow_dispatch).
name: iOS Release

on:
  push:
    tags:
      - "v*-ios"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например 1.0.1)"
        required: true
        type: string
      upload_to_testflight:
        description: "Загрузить в TestFlight"
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Check iOS release secrets
    runs-on: ubuntu-latest
    outputs:
      has_signing: ${{ steps.secrets.outputs.has_signing }}
      has_testflight: ${{ steps.secrets.outputs.has_testflight }}
    steps:
      - name: Check required secrets
        id: secrets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail

          missing_signing=()
          [ -n "${IOS_CERTIFICATE_P12_BASE64:-}" ] || missing_signing+=("IOS_CERTIFICATE_P12_BASE64")
          [ -n "${IOS_CERTIFICATE_PASSWORD:-}" ] || missing_signing+=("IOS_CERTIFICATE_PASSWORD")
          [ -n "${IOS_PROVISIONING_PROFILE_BASE64:-}" ] || missing_signing+=("IOS_PROVISIONING_PROFILE_BASE64")
          [ -n "${IOS_PROVISIONING_PROFILE_NAME:-}" ] || missing_signing+=("IOS_PROVISIONING_PROFILE_NAME")
          [ -n "${APPLE_TEAM_ID:-}" ] || missing_signing+=("APPLE_TEAM_ID")

          missing_testflight=()
          [ -n "${APPLE_API_KEY_ID:-}" ] || missing_testflight+=("APPLE_API_KEY_ID")
          [ -n "${APPLE_API_ISSUER_ID:-}" ] || missing_testflight+=("APPLE_API_ISSUER_ID")
          [ -n "${APPLE_API_KEY_CONTENT:-}" ] || missing_testflight+=("APPLE_API_KEY_CONTENT")

          if [ "${#missing_signing[@]}" -eq 0 ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${#missing_testflight[@]}" -eq 0 ]; then
            echo "has_testflight=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_testflight=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "### iOS Release readiness"
            echo
            if [ "${#missing_signing[@]}" -eq 0 ]; then
              echo "- Signing secrets: ready"
            else
              echo "- Signing secrets: missing ${missing_signing[*]}"
              echo "- Archive and IPA export will be skipped until signing secrets are configured."
            fi
            if [ "${#missing_testflight[@]}" -eq 0 ]; then
              echo "- TestFlight upload secrets: ready"
            else
              echo "- TestFlight upload secrets: missing ${missing_testflight[*]}"
              echo "- IPA upload to TestFlight will be skipped until App Store Connect API secrets are configured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-upload:
    name: Build & Upload to App Store Connect
    needs: preflight
    if: ${{ needs.preflight.outputs.has_signing == 'true' }}
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Set version from tag or input
        id: version
        run: |
          if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v*-ios ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            VERSION="${VERSION%-ios}"
          else
            VERSION="${{ inputs.version || '1.0.0' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        run: |
          PLIST="ios/ARViewer/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PLIST"

      - name: Install Apple Certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies -project ios/ARViewer.xcodeproj -scheme ARViewer

      - name: Build for App Store (Archive)
        run: |
          xcodebuild archive \
            -project ios/ARViewer.xcodeproj \
            -scheme ARViewer \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ARViewer.xcarchive" \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ARViewer.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARViewer-${{ steps.version.outputs.version }}.ipa
          path: ${{ runner.temp }}/export/ARViewer.ipa
          retention-days: 90

      - name: Prepare App Store Connect API key
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true)) && needs.preflight.outputs.has_testflight == 'true' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Upload to TestFlight
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true)) && needs.preflight.outputs.has_testflight == 'true' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/ARViewer.ipa" \
            -t ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Explain TestFlight upload skip
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true)) && needs.preflight.outputs.has_testflight != 'true' }}
        run: |
          {
            echo "### TestFlight upload skipped"
            echo
            echo "IPA was built, but App Store Connect API secrets are not fully configured yet."
            echo "Add APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, and APPLE_API_KEY_CONTENT to enable upload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ runner.temp }}/export/ExportOptions.plist
          retention-days: 30
